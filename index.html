<div class="dashboard">
  <div class="top-bar">

        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>

      <div><div class="drive-label">DRIVE MODE</div><div class="drive-value">NORMAL - SPORT</div></div>
      <div class="gear-box"><span class="gear-letter">D</span></div>
      <div><div class="radio-label">RADIO</div><div class="radio-value">FM 100,5</div></div>
    </div>

    <!-- MAP VIEW (Hidden by default) -->
    <div id="mapContainer" class="map-container" style="display:none;">
      <div id="map" class="map"></div>
    </div>

    <!-- CONTROL BUTTONS -->
    <div id="controlsArea" class="controls-area">
      <div class="status-group">
        <div id="statusTxt" class="status-label">STANDBY</div>
        <div id="connStatus" class="connection-status">ESP32: Connecting...</div>
        <div id="commandStatus" class="status-label">COMMAND: none</div>
      </div>
      <div class="ctrl-row">
        <div class="ctrl-spacer"></div>
        <button class="ctrl-btn" id="btnFwd" data-dir="FORWARD">
          <svg viewBox="0 0 18 18" fill="none"><polygon points="9,2 16,14 2,14" fill="#0af"/></svg>
          FORWARD
        </button>
        <div class="ctrl-spacer"></div>
      </div>
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btnLeft" data-dir="LEFT">
          <svg viewBox="0 0 18 18" fill="none"><polygon points="14,2 14,16 2,9" fill="#0af"/></svg>
          LEFT
        </button>
        <button class="stop-btn" id="btnStop">STOP</button>
        <button class="ctrl-btn" id="btnRight" data-dir="RIGHT">
          <svg viewBox="0 0 18 18" fill="none"><polygon points="4,2 4,16 16,9" fill="#0af"/></svg>
          RIGHT
        </button>
      </div>
      <div class="ctrl-row">
        <div class="ctrl-spacer"></div>
        <button class="ctrl-btn" id="btnBwd" data-dir="BACKWARD">

          BACKWARD
        </button>
        <div class="ctrl-spacer"></div>
      </div>
    </div>

        <div class="gauge-divider"></div>
        <div class="gauge-block">

</div>
